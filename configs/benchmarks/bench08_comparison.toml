[model]
type = "TFIM"
L = 20
J = 1.0
bc = "periodic"

[quench]
schedule = "linear"

[sweep]
tau_Q_values = [5.0, 10.0, 20.0]
N_steps_values = [10, 20, 50, 100, 200]

[simulation]
chi_max = 128
cutoff = 1e-12

[reference]
n_steps = 2000
chi_max = 128

[output]
data_dir = "data/bench08"
figure_dir = "figures/bench08"
